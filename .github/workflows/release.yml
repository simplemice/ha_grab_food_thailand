name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip release commits created by this workflow itself
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Bump patch version in manifest.json ──────────────────────────────
      - name: Bump version
        id: ver
        run: |
          CURRENT=$(jq -r '.version' custom_components/grab_food/manifest.json)
          IFS='.' read -r MA MI PA <<< "$CURRENT"
          NEW="${MA}.${MI}.$((PA + 1))"
          jq --arg v "$NEW" '.version = $v' custom_components/grab_food/manifest.json \
            > /tmp/manifest.json && mv /tmp/manifest.json custom_components/grab_food/manifest.json
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "old=$CURRENT" >> "$GITHUB_OUTPUT"

      # ── Collect all commit messages since the previous release tag ────────
      # Each commit's subject and full body are captured (multiline safe).
      - name: Collect commit log
        id: log
        run: |
          LAST=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RANGE="${LAST:+${LAST}..}HEAD"

          {
            echo 'notes<<__RELEASE_EOF__'
            # Print subject as heading, then body; squeeze blank lines
            git log --format="### %s%n%n%b" $RANGE | cat -s | sed '/^$/N;/^\n$/d'
            echo '__RELEASE_EOF__'
          } >> "$GITHUB_OUTPUT"

      # ── Prepend new section to CHANGELOG.md ──────────────────────────────
      - name: Update CHANGELOG.md
        env:
          VER: ${{ steps.ver.outputs.new }}
          NOTES: ${{ steps.log.outputs.notes }}
        run: |
          DATE=$(date -u +%Y-%m-%d)

          if [ -f CHANGELOG.md ]; then
            OLD_BODY=$(tail -n +2 CHANGELOG.md | sed '/./,$!d')
            {
              echo "# Changelog"
              echo ""
              printf "## [%s] - %s\n\n" "$VER" "$DATE"
              printf '%s\n' "$NOTES"
              echo ""
              printf '%s\n' "$OLD_BODY"
            } > CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              printf "## [%s] - %s\n\n" "$VER" "$DATE"
              printf '%s\n' "$NOTES"
            } > CHANGELOG.md
          fi

      # ── Commit bumped manifest + changelog, create tag, push ─────────────
      - name: Commit, tag and push
        env:
          VER: ${{ steps.ver.outputs.new }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/grab_food/manifest.json CHANGELOG.md
          git commit -m "chore: release v${VER}"
          git tag "v${VER}"
          git push origin main --follow-tags

      # ── Write release body to file (safe multiline handling) ─────────────
      - name: Write release notes
        env:
          NOTES: ${{ steps.log.outputs.notes }}
        run: printf '%s\n' "$NOTES" > /tmp/release_notes.md

      # ── Create GitHub release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.new }}"
          name: "v${{ steps.ver.outputs.new }}"
          body_path: /tmp/release_notes.md
          make_latest: true
